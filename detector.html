<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEZ SRP — Детектор артефактов</title>
    <style>
        body {
            background: #17161c url('images/fon.jpg') no-repeat center fixed;
            background-size: cover;
            font-family: Arial, sans-serif;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            background: rgba(0,0,0,0.75);
            padding: 40px;
            border-radius: 12px;
            max-width: 700px;
            margin: 40px auto;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            text-align: center;
        }
        h1 { font-size: 2.6em; color: #DCDCDC; margin-bottom: 10px; }
        .subtitle { font-size: 1.3em; opacity: 0.9; margin-bottom: 35px; }
        label, select, input, button {
            font-size: 1.2em;
            margin: 15px auto;
            display: block;
            width: 100%;
            max-width: 400px;
        }
        select, 
        input[type="text"], 
        button {
            font-size: 1.2em;
            margin: 15px auto;
            display: block;
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }

        select, 
        input[type="text"] {
            padding: 12px;
            border: 1px solid #a9c1d9;
            border-radius: 8px;
            background: #1a1d23;
            color: #e0e0e0;
            height: 50px;
        }

        button {
            padding: 12px;
            height: 50px;
            font-weight: bold;
            background: linear-gradient(135deg, #2a2f3a, #1a1d23);
            color: #a9c1d9;
            border: 2px solid #a9c1d9;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            line-height: 1;
        }

        button:hover {
            transform: translateY(-4px);
            background: linear-gradient(135deg, #3a3f4a, #2a2d3b);
            color: white;
            box-shadow: 0 8px 20px rgba(169,193,217,0.3);
        }

        button:disabled { 
            opacity: 0.5; 
            cursor: not-allowed; 
            transform: none;
        }
        
        #detector-area {
            margin: 50px auto 10px;
            width: 380px;
            max-width: 100%;
            height: auto;
            aspect-ratio: 1/1;
            position: relative;
            border: 2px solid #a9c1d9;
            border-radius: 12px;
            overflow: hidden;
            background: #111;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }
        
        #detector-bg { 
            width: 100%; 
            height: 100%; 
            object-fit: contain;
        }
        
        #player-number {
            position: absolute;
            top: 4%;
            left: 50%;
            transform: translateX(-50%);
            font-size: min(2.4em, 8vw);
            font-weight: bold;
            color: #ffcc00;
            text-shadow: 0 0 12px #ffcc00;
            z-index: 3;
            white-space: nowrap;
            max-width: 90%;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        #scan-number {
            position: absolute;
            bottom: 4%;
            left: 50%;
            transform: translateX(-50%);
            font-size: min(1.2em, 4vw);
            color: #a9c1d9;
            text-shadow: 0 0 8px #a9c1d9;
            z-index: 3;
            background: rgba(0,0,0,0.5);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid #a9c1d9;
            backdrop-filter: blur(2px);
            white-space: nowrap;
        }
        
        #result {
            margin-top: 0px;
            font-size: min(1.5em, 8vw);
            font-weight: bold;
            min-height: 0px;
            word-break: break-word;
        }
        .artifact-rare { color: #00ffea; text-shadow: 0 0 10px #00ffea; }
        .artifact-legend { color: #ff00aa; text-shadow: 0 0 15px #ff00aa; }

        #artifact-notification {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .notification-box {
            background: rgba(26,29,35,0.95);
            padding: 50px 60px;
            border-radius: 16px;
            border: 3px solid #a9c1d9;
            box-shadow: 0 0 40px rgba(169,193,217,0.5);
            text-align: center;
            max-width: 600px;
            width: 90%;
        }
        .notification-title { font-size: 2.2em; margin-bottom: 20px; color: #ffcc00; }
        .notification-text { font-size: 1.6em; margin: 20px 0 40px; }
        .notification-btn {
            padding: 16px 40px;
            font-size: 1.3em;
            margin: 0 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
        }
        .btn-take { background: #00cc66; color: white; }
        .btn-take:hover { background: #00b359; transform: scale(1.08); }
        .btn-drop { background: #cc0000; color: white; }
        .btn-drop:hover { background: #b30000; transform: scale(1.08); }

        #log {
            margin-top: 30px;
            background: rgba(0,0,0,0.6);
            padding: 15px;
            border-radius: 8px;
            text-align: left;
            max-height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.9em;
            color: #0f0;
            display: none;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px 15px;
            }
            h1 {
                font-size: 2em;
            }
            .subtitle {
                font-size: 1.1em;
            }
            #player-number {
                font-size: min(2em, 7vw);
            }
            #scan-number {
                font-size: min(1em, 3.5vw);
                padding: 3px 8px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Детектор артефактов</h1>
        <div class="subtitle">CEZ SRP</div>

        <label for="detector-type">Тип детектора:</label>
        <select id="detector-type">
            <option value="Отклик">Отклик</option>
            <option value="Медведь">Медведь</option>
            <option value="Велес">Велес</option>
            <option value="Сварог">Сварог</option>
        </select>

        <label for="anomaly-type">Тип аномалии:</label>
        <select id="anomaly-type">
            <option value="none">Без аномалии</option>
            <option value="Гравитационная">Гравитационная</option>
            <option value="Электрическая">Электрическая</option>
            <option value="Термическая">Термическая</option>
        </select>

        <label for="player-id">Номер игрока:</label>
        <input type="text" id="player-id" placeholder="Ваш игровой номер" maxlength="10">

        <button id="scan-btn">Сканировать</button>
        
        <!-- Индикатор заряда -->
        <div id="charge-display" style="margin-top: 20px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 8px; font-size: 1.1em; color: #a9c1d9;"></div>
                
        <div id="detector-area">
            <img id="detector-bg" src="" alt="Детектор">
            <div id="player-number"></div>
            <div id="scan-number"></div>
        </div>
        
        <div id="result"></div>

        <div id="log">Лог отладки (обновляется автоматически):<br></div>
    </div>

    <div id="artifact-notification">
        <div class="notification-box">
            <div class="notification-title">Артефакт обнаружен!</div>
            <div class="notification-text" id="found-artifact"></div>
            <button class="scan-btn" onclick="handleArtifactAction('забрал')">Забрать</button>
            <button class="scan-btn" onclick="handleArtifactAction('выбросил')">Выбросить</button>
        </div>
    </div>

    <!-- Аудио элементы для звуков -->
    <audio id="click-sound" preload="auto" style="display: none;">
        <source src="sounds/click.m4a" type="audio/mp4">
        <source src="sounds/click.mp3" type="audio/mpeg">
        <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" type="audio/mpeg">
    </audio>
    
    <audio id="scan-sound" preload="auto" style="display: none;">
        <source src="sounds/scan.m4a" type="audio/mp4">
        <source src="sounds/scan.mp3" type="audio/mpeg">
        <source src="https://www.soundjay.com/misc/sounds/electronic-beeper-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        const logDiv = document.getElementById('log');
        function addLog(message) {
            console.log(message);
            logDiv.innerHTML += message + '<br>';
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        const detectorType = document.getElementById('detector-type');
        const anomalyType = document.getElementById('anomaly-type');
        const playerIdInput = document.getElementById('player-id');
        const scanBtn = document.getElementById('scan-btn');
        const detectorImg = document.getElementById('detector-bg');
        const playerNumberDisplay = document.getElementById('player-number');
        const scanNumberDisplay = document.getElementById('scan-number');
        const resultDiv = document.getElementById('result');

        const detectorImages = {
            "Отклик": 'images/detectors/otklik.png',
            "Медведь": 'images/detectors/medved.png',
            "Велес": 'images/detectors/veles.png',
            "Сварог": 'images/detectors/svarog.png'
        };

        let artifacts = [];
        let currentScanNumber = '';
        
        // ============ ЗВУКИ ============
        // Получаем элементы аудио
        const clickSound = document.getElementById('click-sound');
        const scanSound = document.getElementById('scan-sound');
        
        // Флаг, что звуки готовы к воспроизведению
        let soundsReady = false;
        
        // Инициализация звуков (должна быть вызвана после взаимодействия пользователя)
        function initSounds() {
            if (soundsReady) return;
            
            // Пытаемся загрузить звуки
            clickSound.load();
            scanSound.load();
            
            // Устанавливаем низкую громкость
            clickSound.volume = 0.5;
            scanSound.volume = 0.3;
            
            soundsReady = true;
            addLog("Звуки инициализированы");
        }

        // Звук нажатия
        function playClickSound() {
            if (!soundsReady) {
                initSounds();
            }
            
            try {
                // Создаем копию для параллельного воспроизведения
                const clickClone = clickSound.cloneNode(true);
                clickClone.volume = 0.5;
                
                // Воспроизводим и сразу удаляем после окончания
                const playPromise = clickClone.play();
                
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        addLog('Ошибка воспроизведения звука нажатия: ' + error);
                    });
                }
                
                // Удаляем клон после воспроизведения
                clickClone.addEventListener('ended', () => {
                    clickClone.remove();
                });
            } catch (e) {
                addLog('Audio error (click): ' + e);
            }
        }

        // Звук сканирования
        function playScanSound() {
            if (!soundsReady) {
                initSounds();
            }
            
            try {
                const scanClone = scanSound.cloneNode(true);
                scanClone.volume = 0.3;
                
                const playPromise = scanClone.play();
                
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        addLog('Ошибка воспроизведения звука сканирования: ' + error);
                    });
                }
                
                scanClone.addEventListener('ended', () => {
                    scanClone.remove();
                });
            } catch (e) {
                addLog('Audio error (scan): ' + e);
            }
        }

        // Переменные для управления звуками сканирования
        let scanSoundInterval = null;
        const scanSoundIntervalTime = 3000; // 3 секунды между звуками

        // Функция запуска звуков сканирования
        function startScanSounds() {
            if (scanSoundInterval) {
                clearInterval(scanSoundInterval);
            }
            
            // Небольшая задержка перед первым звуком
            setTimeout(() => {
                playScanSound();
            }, 100);
            
            // Затем каждые 3 секунды
            scanSoundInterval = setInterval(playScanSound, scanSoundIntervalTime);
            
            addLog("Звуки сканирования запущены");
        }

        // Функция остановки звуков сканирования
        function stopScanSounds() {
            if (scanSoundInterval) {
                clearInterval(scanSoundInterval);
                scanSoundInterval = null;
                addLog("Звуки сканирования остановлены");
            }
        }
        
        // ============ СИСТЕМА ЗАРЯДОВ ДЛЯ КАЖДОГО ДЕТЕКТОРА ============
        let detectorCharge = {
            "Отклик": 5,
            "Медведь": 4,
            "Велес": 3,
            "Сварог": 3
        };

        let lastChargeTime = {
            "Отклик": Date.now(),
            "Медведь": Date.now(),
            "Велес": Date.now(),
            "Сварог": Date.now()
        };

        let scanTimeout = null;
        let isScanning = false;
        let scanStartTime = null;
        const scanDuration = 5000; // 5 секунд

        const detectorRegenTime = {
            "Отклик": 7200000,
            "Медведь": 10800000,
            "Велес": 10800000,
            "Сварог": 10800000
        };

        const detectorMaxCharge = {
            "Отклик": 5,
            "Медведь": 4,
            "Велес": 3,
            "Сварог": 3
        };

        const STORAGE_KEYS = {
            CHARGE: 'detector_charge_all',
            LAST_TIME: 'last_charge_time_all',
            SCAN_STATE: 'scan_state'
        };

        function generateScanNumber() {
            return Math.floor(10000 + Math.random() * 90000).toString();
        }

        function loadChargesFromStorage() {
            try {
                const savedCharges = localStorage.getItem(STORAGE_KEYS.CHARGE);
                const savedTimes = localStorage.getItem(STORAGE_KEYS.LAST_TIME);
                const now = Date.now();
                
                if (savedCharges && savedTimes) {
                    const charges = JSON.parse(savedCharges);
                    const times = JSON.parse(savedTimes);
                    
                    Object.keys(detectorMaxCharge).forEach(detector => {
                        const maxCharge = detectorMaxCharge[detector] || 5;
                        const regenTime = detectorRegenTime[detector] || 60000;
                        
                        if (charges[detector] !== undefined && times[detector]) {
                            const timePassed = now - times[detector];
                            const chargesToAdd = Math.floor(timePassed / regenTime);
                            detectorCharge[detector] = Math.min(maxCharge, charges[detector] + chargesToAdd);
                            lastChargeTime[detector] = now;
                            
                            addLog(`Детектор ${detector}: заряд восстановлен ${detectorCharge[detector]}/${maxCharge} (прошло ${Math.floor(timePassed/1000)}с, +${chargesToAdd} зарядов)`);
                        } else {
                            detectorCharge[detector] = maxCharge;
                            lastChargeTime[detector] = now;
                        }
                    });
                } else {
                    Object.keys(detectorMaxCharge).forEach(detector => {
                        detectorCharge[detector] = detectorMaxCharge[detector] || 5;
                        lastChargeTime[detector] = now;
                    });
                }
                saveChargesToStorage();
            } catch (e) {
                console.error("Ошибка загрузки зарядов:", e);
            }
            updateChargeDisplay();
        }

        function saveChargesToStorage() {
            try {
                localStorage.setItem(STORAGE_KEYS.CHARGE, JSON.stringify(detectorCharge));
                localStorage.setItem(STORAGE_KEYS.LAST_TIME, JSON.stringify(lastChargeTime));
            } catch (e) {
                console.error("Ошибка сохранения зарядов:", e);
            }
        }

        function checkAndRegenCharge() {
            const currentDetector = detectorType.value;
            const now = Date.now();
            const timePassed = now - lastChargeTime[currentDetector];
            const regenTime = detectorRegenTime[currentDetector] || 60000;
            const maxCharge = detectorMaxCharge[currentDetector] || 5;
            const chargesToAdd = Math.floor(timePassed / regenTime);
            
            if (chargesToAdd > 0) {
                const oldCharge = detectorCharge[currentDetector];
                detectorCharge[currentDetector] = Math.min(maxCharge, detectorCharge[currentDetector] + chargesToAdd);
                lastChargeTime[currentDetector] = now;
                
                if (oldCharge !== detectorCharge[currentDetector]) {
                    addLog(`Детектор ${currentDetector}: восстановлено ${detectorCharge[currentDetector] - oldCharge} зарядов`);
                    saveChargesToStorage();
                    updateChargeDisplay();
                }
            }
        }

        function updateChargeDisplay() {
            const chargeElement = document.getElementById('charge-display');
            if (chargeElement) {
                const currentDetector = detectorType.value;
                const currentCharge = detectorCharge[currentDetector] || 0;
                const maxCharge = detectorMaxCharge[currentDetector] || 5;
                const regenTime = detectorRegenTime[currentDetector] || 60000;
                
                const minutes = Math.floor(regenTime / 60000);
                const seconds = (regenTime % 60000) / 1000;
                const timeText = minutes > 0 ? `${minutes} мин` : `${seconds} сек`;
                
                let allDetectorsInfo = '<br><small>Другие детекторы:</small>';
                Object.keys(detectorMaxCharge).forEach(detector => {
                    if (detector !== currentDetector) {
                        allDetectorsInfo += `<br><small>${detector}: ${detectorCharge[detector] || 0}/${detectorMaxCharge[detector]}</small>`;
                    }
                });
                
                chargeElement.innerHTML = `🔋 Текущий детектор (${currentDetector}): ${currentCharge}/${maxCharge}<br>
                    <small>Восстановление: +1 заряд каждые ${timeText}</small>
                    ${allDetectorsInfo}`;
            }
        }

        function spendCharge() {
            const currentDetector = detectorType.value;
            if (detectorCharge[currentDetector] > 0) {
                detectorCharge[currentDetector]--;
                lastChargeTime[currentDetector] = Date.now();
                saveChargesToStorage();
                updateChargeDisplay();
                return true;
            }
            return false;
        }

        function getCurrentCharge() {
            return detectorCharge[detectorType.value] || 0;
        }

        function getCurrentMaxCharge() {
            return detectorMaxCharge[detectorType.value] || 5;
        }

        function saveScanState() {
            if (isScanning && scanStartTime) {
                const state = {
                    isScanning: true,
                    scanStartTime: scanStartTime,
                    playerId: playerIdInput.value.trim(),
                    detectorType: detectorType.value,
                    anomalyType: anomalyType.value,
                    scanNumber: currentScanNumber
                };
                localStorage.setItem(STORAGE_KEYS.SCAN_STATE, JSON.stringify(state));
            } else {
                localStorage.removeItem(STORAGE_KEYS.SCAN_STATE);
            }
        }

        function restoreScanState() {
            const savedState = localStorage.getItem(STORAGE_KEYS.SCAN_STATE);
            if (!savedState) return false;
            
            try {
                const state = JSON.parse(savedState);
                const now = Date.now();
                const elapsedTime = now - state.scanStartTime;
                
                if (state.detectorType !== detectorType.value) {
                    localStorage.removeItem(STORAGE_KEYS.SCAN_STATE);
                    return false;
                }
                
                if (elapsedTime >= scanDuration) {
                    completeScan(state.playerId, state.detectorType, state.anomalyType);
                    return true;
                }
                
                if (elapsedTime < scanDuration && state.isScanning) {
                    isScanning = true;
                    scanStartTime = state.scanStartTime;
                    playerIdInput.value = state.playerId;
                    detectorType.value = state.detectorType;
                    anomalyType.value = state.anomalyType;
                    currentScanNumber = state.scanNumber || generateScanNumber();
                    
                    playerNumberDisplay.textContent = state.playerId;
                    scanNumberDisplay.textContent = `#${currentScanNumber}`;
                    scanBtn.textContent = "Отменить сканирование";
                    
                    const remainingSeconds = Math.ceil((scanDuration - elapsedTime)/1000);
                    resultDiv.textContent = `Детектор работает... (осталось ${remainingSeconds} сек)`;
                    
                    startScanSounds();
                    
                    const remainingTime = scanDuration - elapsedTime;
                    scanTimeout = setTimeout(() => {
                        completeScan(state.playerId, state.detectorType, state.anomalyType);
                    }, remainingTime);
                    
                    addLog(`Восстановлено сканирование: осталось ${remainingSeconds} сек, номер #${currentScanNumber}`);
                    return true;
                }
            } catch (e) {
                console.error("Ошибка восстановления состояния:", e);
            }
            return false;
        }

        function completeScan(playerId, detector, anomaly) {
            stopScanSounds();
            spendCharge();
            performArtifactSearch(playerId, detector, anomaly);
            
            isScanning = false;
            scanStartTime = null;
            scanTimeout = null;
            saveScanState();
            
            scanBtn.disabled = false;
            scanBtn.textContent = "Сканировать";
        }

        function performArtifactSearch(playerId, selectedDetector, selectedAnomaly) {
            addLog("Детектор: " + selectedDetector);
            addLog("Аномалия: " + selectedAnomaly);

            if (artifacts.length === 0) {
                resultDiv.textContent = "База не загружена!";
                addLog("Ошибка: artifacts пустой");
                return;
            }

            addLog("Начало подсчёта кандидатов (взвешенный выбор с учетом аномалии)...");

            let totalWeight = 0;
            const weightedList = [];

            artifacts.forEach(art => {
                const artifactAnomaly = art['Аномалия'] || '';
                const artifactName = art['Артефакт \\ Детектор'] || '';
                
                let prob = parseInt(art[selectedDetector] || 0, 10);
                
                if (artifactName.toLowerCase() === 'nothing') {
                    if (prob > 0) {
                        totalWeight += prob;
                        weightedList.push({ art, weight: prob });
                        addLog(`Добавлен: ${artifactName} (ВСЕГДА, вес ${prob} из таблицы)`);
                    }
                    return;
                }
                
                let anomalyMatch = false;
                
                if (selectedAnomaly === 'none') {
                    anomalyMatch = !artifactAnomaly || artifactAnomaly.toLowerCase() === 'none' || artifactAnomaly === '';
                } else {
                    anomalyMatch = artifactAnomaly.toLowerCase() === selectedAnomaly.toLowerCase();
                }
                
                if (!anomalyMatch) {
                    return;
                }

                if (prob > 0) {
                    totalWeight += prob;
                    weightedList.push({ art, weight: prob });
                    addLog(`Добавлен: ${artifactName} (аномалия: ${artifactAnomaly}, вес ${prob})`);
                }
            });

            addLog("Общий вес кандидатов с учетом аномалии: " + totalWeight);
            
            if (totalWeight === 0) {
                addLog("Нет артефактов, соответствующих выбранной аномалии");
                resultDiv.textContent = "В этой аномалии ничего не найдено";
                notifyTelegram('завершил сканирование', 'Результат: ничего не найдено (нет артефактов в этой аномалии)');
                return;
            }

            let artifact = { 'Артефакт \\ Детектор': "Ничего не найдено" };

            if (totalWeight > 0) {
                let random = Math.random() * totalWeight;
                for (const item of weightedList) {
                    random -= item.weight;
                    if (random <= 0) {
                        artifact = item.art;
                        break;
                    }
                }
            }

            const artName = artifact['Артефакт \\ Детектор'] || "без имени";
            addLog("Выбран: " + artName);

            const lowerName = artName.toLowerCase();
            if (lowerName === "nothing" || lowerName === "ничего" || lowerName === "") {
                resultDiv.textContent = "Ничего не найдено";
                addLog("Результат: ничего");
                notifyTelegram('завершил сканирование', `Результат: ничего не найдено (номер сканирования: #${currentScanNumber})`);
            } else {
                let colorClass = '';
                const rarity = artifact.rarity?.toLowerCase() || 'common';
                if (rarity === 'rare') colorClass = 'artifact-rare';
                if (rarity === 'legend') colorClass = 'artifact-legend';

                resultDiv.innerHTML = "Обнаружен артефакт: " + artName;

                document.getElementById('found-artifact').innerHTML = artName;
                document.getElementById('artifact-notification').style.display = 'flex';

                addLog("Результат: найден " + artName);
                notifyTelegram('обнаружил артефакт', `Найден: ${artName} (${rarity}) в аномалии ${selectedAnomaly} (номер сканирования: #${currentScanNumber})`);
            }
        }

        detectorType.addEventListener('change', () => {
            const selected = detectorType.value;
            checkAndRegenCharge();
            updateChargeDisplay();
            addLog(`Переключено на детектор ${selected}: заряд ${detectorCharge[selected]}/${detectorMaxCharge[selected]}`);
            detectorImg.src = detectorImages[selected] || 'images/detectors/default.png';
        });

        window.addEventListener('load', () => {
            loadChargesFromStorage();
            if (!restoreScanState()) {
                updateChargeDisplay();
                currentScanNumber = generateScanNumber();
                scanNumberDisplay.textContent = `#${currentScanNumber}`;
            }
            
            // Инициализируем звуки при загрузке
            initSounds();
        });

        scanBtn.addEventListener('click', () => {
            // Инициализируем звуки если ещё не
            if (!soundsReady) {
                initSounds();
            }
            
            playClickSound();
            checkAndRegenCharge();
            
            if (isScanning) {
                if (scanTimeout) {
                    clearTimeout(scanTimeout);
                    scanTimeout = null;
                }
                stopScanSounds();
                isScanning = false;
                scanStartTime = null;
                saveScanState();
                scanBtn.textContent = "Сканировать";
                resultDiv.textContent = "Сканирование отменено";
                addLog("Сканирование отменено пользователем");
                return;
            }
            
            if (getCurrentCharge() <= 0) {
                alert("Нет заряда для этого детектора! Подожди восстановления.");
                return;
            }
            
            const playerId = playerIdInput.value.trim();
            if (!playerId) {
                alert("Введи номер игрока!");
                return;
            }

            currentScanNumber = generateScanNumber();
            isScanning = true;
            scanStartTime = Date.now();
            playerNumberDisplay.textContent = playerId;
            scanNumberDisplay.textContent = `#${currentScanNumber}`;
            addLog(`Сканирование начато. Игрок: ${playerId}, номер сканирования: #${currentScanNumber}`);
            
            notifyTelegram('начал сканирование', `номер сканирования: #${currentScanNumber}`);

            scanBtn.textContent = "Отменить сканирование";
            resultDiv.textContent = "Детектор работает... (нажми 'Отменить' для прерывания)";

            startScanSounds();
            saveScanState();

            scanTimeout = setTimeout(() => {
                completeScan(playerId, detectorType.value, anomalyType.value);
            }, scanDuration);
        });

        function notifyTelegram(action, details = '') {
            const token = '7601048796:AAG6n3IO8E4K0CgqAl-SETz70ERsSci9DL4';
            const chatId = '-1003590431257';
            
            const playerId = playerIdInput.value.trim() || 'неизвестный';
            const detector = detectorType.value;
            const anomaly = anomalyType.value === 'none' ? 'без аномалии' : anomalyType.value;
            
            let text = `🎮 Игрок ${playerId}\n`;
            text += `📡 Детектор: ${detector}\n`;
            text += `🌪 Аномалия: ${anomaly}\n`;
            text += `🔋 Заряд: ${getCurrentCharge()}/${getCurrentMaxCharge()}\n`;
            text += `🆔 Номер сканирования: #${currentScanNumber}\n`;
            text += `🔄 Действие: ${action}\n`;
            
            if (details) {
                text += `📝 ${details}`;
            }
            
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(text)}`)
                .catch(error => addLog('Ошибка отправки в Telegram: ' + error));
        }

        function handleArtifactAction(action) {
            const artifactName = document.getElementById('found-artifact').textContent;
            notifyTelegram(action, `Артефакт: ${artifactName}`);
            closeNotification();
        }

        async function loadArtifacts() {
            addLog("Начало загрузки таблицы...");
            try {
                const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQH7LcXjMumSy4IsPJ-wWnxMF91UeyF193u7deot4q2bJC_Koa03Sh5OIr71JJ2UNk7rKrrc5LxcW7M/pub?output=csv&gid=0';

                addLog("Запрос к таблице...");
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ошибка: ${response.status}`);

                const csvText = await response.text();
                addLog("CSV получен (" + csvText.length + " символов)");

                const lines = csvText.trim().split('\n');
                addLog("Строк в CSV: " + lines.length);

                if (lines.length < 2) throw new Error('Таблица пустая');

                const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
                addLog("Заголовки: " + headers.join(", "));

                artifacts = lines.slice(1).map(line => {
                    const values = line.split(',').map(v => v.trim().replace(/^"|"$/g, ''));
                    const obj = {};
                    headers.forEach((header, i) => {
                        obj[header.trim()] = values[i] || '';
                    });
                    return obj;
                });

                addLog(`Артефактов загружено: ${artifacts.length}`);
                if (artifacts.length > 0) {
                    addLog("Первый артефакт: " + (artifacts[0]['Артефакт \\ Детектор'] || 'ключ не найден'));
                    addLog("Второй артефакт: " + (artifacts[1] ? artifacts[1]['Артефакт \\ Детектор'] : "нет"));
                }

                resultDiv.textContent = `Загружено ${artifacts.length} артефактов`;
            } catch (err) {
                addLog("ОШИБКА загрузки: " + err.message);
                resultDiv.textContent = 'Не удалось загрузить базу';
            }
        }

        function closeNotification() {
            document.getElementById('artifact-notification').style.display = 'none';
        }

        loadArtifacts();
        detectorImg.src = detectorImages[detectorType.value];
    </script>
</body>
</html>
